<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
</head>
<body>
<h1 th:text="${user.id == null} ? 'Create User' : 'Edit User'">User Form</h1>
<form th:action="@{${user.id == null} ? '/admin/save' : '/admin/update/' + ${user.id}}"
      th:object="${user}" method="post">
    <input type="hidden" th:if="${user.id != null}" th:field="*{id}"/>
    <p>Name: <input type="text" th:field="*{name}" required/></p>
    <p>Email: <input type="email" th:field="*{email}" required/></p>
    <p>Age: <input type="number" th:field="*{age}" required/></p>
    <p>Password: <input type="password" th:field="*{password}"
                        th:required="${user.id == null}"/>
        <span th:if="${user.id != null}">(leave blank to keep current)</span>
    </p>
    <p>Roles:
        <select multiple="multiple" th:field="*{roles}" required>
            <option th:each="role : ${allRoles}"
                    th:value="${role.id}"
                    th:text="${role.name}">ROLE_USER</option>
        </select>
    </p>
    <p>
        <button type="submit">Save</button>
        <a th:href="@{/admin}">Cancel</a>
    </p>
</form>
</body>
</html>
