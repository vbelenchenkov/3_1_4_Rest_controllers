<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Spring Boot App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Общие стили для вкладок */
        .tabs-container .tab-link,
        .tabs-container .tab-link.active,
        .tabs-container .tab-link:not(.active) {
            text-decoration: none !important;
            background-color: transparent !important;
            color: #0d6efd !important;
            border: none;
            border-bottom: 2px solid transparent;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
            padding: 0.75rem 1.2rem !important;
        }
        .tabs-container .tab-link.active {
            background-color: white !important;
            color: #212529 !important;
            border: 1px solid #dee2e6;
            border-bottom-color: white;
            border-radius: 0.25rem 0.25rem 0 0;
            margin-bottom: -1px;
        }
        .tabs-container .tab-link:not(.active):hover {
            background-color: rgba(0,0,0,0.05) !important;
            color: #0a58ca !important;
        }
        /* Общие стили для строки "All users" / "Add new user" */
        .all-users-header {
            background-color: #e9ecef;
            padding: 0.5rem 1rem;
            padding-left: 6mm;
            margin: 0;
            font-weight: 500;
            font-size: 1.6rem;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
        }
        /* Общие стили для полей формы (центрирование) */
        .form-group-centered {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1rem;
        }
        .form-group-centered label {
            font-weight: bold;
            text-align: center;
            width: 100%;
        }
        .form-group-centered .form-control,
        .form-group-centered .form-select {
            width: 30% !important;
            min-width: 200px;
        }
        /* Жёлтый фон для полей First name, Last name, Email */
        #firstName, #lastName, #email {
            background-color: #fff9c4 !important;
        }
    </style>
</head>
<body>
<!-- Навигационная панель -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <div class="navbar-text text-white">
            <span sec:authentication="name"></span> with roles:
            <span th:each="role, roleStat : ${#authentication.principal.roles}">
                <span th:text="${role.displayName}"></span>
                <span th:if="${!roleStat.last}">, </span>
            </span>
        </div>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Основной контейнер для контента -->
<div class="container" th:fragment="content">
    <!-- Здесь будет контент каждой страницы -->
</div>

<!-- Bootstrap JS (обязательно!) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
