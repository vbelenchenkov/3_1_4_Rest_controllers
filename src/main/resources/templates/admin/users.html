<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>Admin Panel</title>
    <style>
        .table th, .table td {
            border-top: 1px solid #dee2e6;
            border-bottom: none;
            border-left: none;
            border-right: none;
        }
        .table thead th {
            border-bottom-width: 2px;
        }
        .table-striped>tbody>tr:nth-of-type(odd) {
            background-color: #f8f9fa;
        }
        .tabs-container a.tab-link,
        .tabs-container a.tab-link.active,
        .tabs-container a.tab-link:not(.active) {
            text-decoration: none !important;
            background-color: #e9ecef !important;
            color: #0d6efd !important;
            transition: background-color 0.2s, color 0.2s;
        }
        .tabs-container a.tab-link.active {
            background-color: white !important;
            color: #212529 !important;
            border-bottom: 1px solid white !important;
            margin-bottom: -1px;
        }
        .tabs-container a.tab-link:not(.active):hover {
            background-color: #dee2e6 !important;
            color: #0a58ca !important;
        }
        .tabs-container {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 0;
        }
        .all-users-header {
            background-color: #e9ecef;
            padding: 0.5rem 1rem;
            padding-left: 6mm;
            margin: 0;
            font-weight: 500;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
        }
        .card {
            border-top: none;
        }
        .card-header {
            background: transparent;
            border-bottom: none;
            padding: 0;
        }
        .modal-body .form-label {
            font-weight: bold;
            text-align: center;
            width: 100%;
        }
        .modal-body .w-33 {
            width: 33.33% !important;
        }
        @media (max-width: 768px) {
            .modal-body .w-33 {
                width: 80% !important;
            }
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-white vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark"
                       th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active bg-primary text-white' :
                       ''}">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark"
                       th:classappend="${#httpServletRequest.requestURI == '/user' ? 'active bg-primary text-white' :
                       ''}">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 bg-light">
            <div class="container-fluid mt-4">
                <div class="row">
                    <div class="col-12">
                        <div class="bg-light p-3 rounded mb-0">
                            <h1 class="mb-3">Admin panel</h1>
                            <div class="tabs-container d-flex gap-2">
                                <a th:href="@{/admin}"
                                   class="tab-link"
                                   th:classappend="${#httpServletRequest.requestURI == '/admin' ? 'active' : ''}">
                                    Users table
                                </a>
                                <a href="#"
                                   class="tab-link"
                                   data-bs-toggle="modal"
                                   data-bs-target="#createUserModal">
                                    New User
                                </a>
                            </div>
                        </div>
                        <div class="bg-white pt-3 pb-4 px-3 rounded mb-0">


                            <div class="all-users-header">
                                All users
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped mb-0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </thead>
                                    </thead>
                                    <tbody id="userTable">

                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/update}" method="post">
                <div class="modal-body">
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">ID</label>
                        <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="editUserIdDisplay">—</div>
                        <input type="hidden" name="id" id="editUserId">
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control text-start w-30" name="firstName" id="editFirstName" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control text-start w-30" name="lastName" id="editLastName" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control text-start w-30" name="age" id="editAge" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control text-start w-30" name="email" id="editEmail" required>
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control text-start w-30" name="password">
                    </div>
                    <div class="mb-3 d-flex flex-column align-items-center">
                        <label class="form-label">Role</label>
                        <select class="form-select text-start w-30" name="roles" multiple size="2">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.displayName}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteUserModalLabel">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">ID</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserIdDisplay"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">First Name</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserFirstName"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Last Name</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserLastName"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Age</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserAge"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Email</label>
                    <div class="bg-secondary bg-opacity-10 p-2 rounded text-start w-30" id="deleteUserEmail"></div>
                </div>
                <div class="mb-3 d-flex flex-column align-items-center">
                    <label class="form-label">Roles</label>
                    <ul class="list-unstyled bg-secondary bg-opacity-10 p-2 rounded text-start w-30 mb-0"
                        id="deleteUserRolesList"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" name="id" id="deleteUserId">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('userTable');
        if (!tbody) {
            console.error('Элемент userTable не найден');
            return;
        }

        let allRoles = [];

        function fillCreateRolesSelect() {
            const select = document.getElementById('createRoles');
            if (!select) return;
            select.innerHTML = '';
            allRoles.forEach(role => {
                const option = document.createElement('option');
                option.value = role.id;
                option.textContent = role.name ? role.name.replace('ROLE_', '') : (role.displayName || role.name);
                select.appendChild(option);
            });
        }

        function loadRolesForModal() {
            return fetch('/api/admin/roles')
                .then(response => response.json())
                .then(roles => {
                    allRoles = roles;
                    const editSelect = document.getElementById('editRoles');
                    editSelect.innerHTML = '';
                    roles.forEach(role => {
                        const option = document.createElement('option');
                        option.value = role.id;
                        option.textContent = role.name ? role.name.replace('ROLE_', '') : (role.displayName || role.name);
                        editSelect.appendChild(option);
                    });
                    fillCreateRolesSelect();
                })
                .catch(error => console.error('Ошибка загрузки ролей:', error));
        }

        function setSelectedRoles(userRoles) {
            const select = document.getElementById('editRoles');
            for (let i = 0; i < select.options.length; i++) {
                const option = select.options[i];
                option.selected = userRoles.some(r => r.id == option.value);
            }
        }

        function loadUsers() {
            fetch('/api/admin/users')
                .then(response => response.json())
                .then(users => {
                    tbody.innerHTML = '';
                    users.forEach(user => {
                        const row = tbody.insertRow();
                        row.insertCell().textContent = user.id;
                        row.insertCell().textContent = user.firstName;
                        row.insertCell().textContent = user.lastName;
                        row.insertCell().textContent = user.age;
                        row.insertCell().textContent = user.email;
                        const rolesCell = row.insertCell();
                        rolesCell.textContent = user.roles.map(r => r.name ? r.name.replace('ROLE_', '') : (r.displayName || r.name)).join(', ');

                        const editCell = row.insertCell();
                        const deleteCell = row.insertCell();

                        const editBtn = document.createElement('button');
                        editBtn.textContent = 'Edit';
                        editBtn.className = 'btn btn-sm btn-primary';
                        editBtn.addEventListener('click', () => {
                            document.getElementById('editUserId').value = user.id;
                            document.getElementById('editFirstName').value = user.firstName;
                            document.getElementById('editLastName').value = user.lastName;
                            document.getElementById('editAge').value = user.age;
                            document.getElementById('editEmail').value = user.email;
                            document.getElementById('editPassword').value = '';
                            setSelectedRoles(user.roles);
                            const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
                            modal.show();
                        });
                        editCell.appendChild(editBtn);

                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = 'Delete';
                        deleteBtn.className = 'btn btn-sm btn-danger';
                        deleteBtn.addEventListener('click', () => {
                            if (confirm('Удалить пользователя ' + user.firstName + ' ' + user.lastName + '?')) {
                                fetch(`/api/admin/users/${user.id}`, { method: 'DELETE' })
                                    .then(response => {
                                        if (response.ok) {
                                            row.remove();
                                        } else {
                                            alert('Ошибка при удалении');
                                        }
                                    })
                                    .catch(error => console.error('Ошибка:', error));
                            }
                        });
                        deleteCell.appendChild(deleteBtn);
                    });
                })
                .catch(error => console.error('Ошибка загрузки пользователей:', error));
        }

        document.getElementById('saveEditBtn').addEventListener('click', () => {
            const id = document.getElementById('editUserId').value;
            const updatedUser = {
                firstName: document.getElementById('editFirstName').value,
                lastName: document.getElementById('editLastName').value,
                age: parseInt(document.getElementById('editAge').value),
                email: document.getElementById('editEmail').value,
                password: document.getElementById('editPassword').value
            };
            const selectedRoles = Array.from(document.getElementById('editRoles').selectedOptions)
                .map(option => option.value)
                .join(',');

            fetch(`/api/admin/users/${id}?roleIds=${selectedRoles}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedUser)
            })
                .then(response => {
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                        loadUsers();
                    } else {
                        alert('Ошибка при обновлении');
                    }
                })
                .catch(error => console.error('Ошибка:', error));
        });

        document.getElementById('saveCreateBtn').addEventListener('click', () => {
            const newUser = {
                firstName: document.getElementById('createFirstName').value,
                lastName: document.getElementById('createLastName').value,
                age: parseInt(document.getElementById('createAge').value),
                email: document.getElementById('createEmail').value,
                password: document.getElementById('createPassword').value
            };
            const selectedRoles = Array.from(document.getElementById('createRoles').selectedOptions)
                .map(option => option.value)
                .join(',');

            fetch(`/api/admin/users?roleIds=${selectedRoles}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newUser)
            })
                .then(response => {
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('createUserModal')).hide();
                        document.getElementById('createUserForm').reset();
                        loadUsers();
                    } else {
                        alert('Ошибка при создании пользователя');
                    }
                })
                .catch(error => console.error('Ошибка:', error));
        });

        loadRolesForModal();
        loadUsers();
    });
</script>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Редактирование пользователя</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label for="editFirstName" class="form-label">First name</label>
                        <input type="text" class="form-control" id="editFirstName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editLastName" class="form-label">Last name</label>
                        <input type="text" class="form-control" id="editLastName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editAge" class="form-label">Age</label>
                        <input type="number" class="form-control" id="editAge" required>
                    </div>
                    <div class="mb-3">
                        <label for="editEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="editEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="editPassword" class="form-label">Password (оставьте пустым, чтобы не менять)</label>
                        <input type="password" class="form-control" id="editPassword">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <select id="editRoles" class="form-select" multiple>
                            <!-- роли будут загружены отдельно -->
                        </select>
                        <div class="form-text">Hold Ctrl (Cmd) to select multiple</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно создания пользователя -->
<div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createUserModalLabel">Добавление пользователя</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createUserForm">
                    <div class="mb-3">
                        <label for="createFirstName" class="form-label">First name</label>
                        <input type="text" class="form-control" id="createFirstName" required>
                    </div>
                    <div class="mb-3">
                        <label for="createLastName" class="form-label">Last name</label>
                        <input type="text" class="form-control" id="createLastName" required>
                    </div>
                    <div class="mb-3">
                        <label for="createAge" class="form-label">Age</label>
                        <input type="number" class="form-control" id="createAge" required>
                    </div>
                    <div class="mb-3">
                        <label for="createEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="createEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="createPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="createPassword" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <select id="createRoles" class="form-select" multiple>
                            <!-- роли будут загружены из allRoles -->
                        </select>
                        <div class="form-text">Hold Ctrl (Cmd) to select multiple</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveCreateBtn">Создать</button>
            </div>
        </div>
    </div>
</div>

</body>

<style>
    .all-users-header {
        background-color: #e9ecef;
        padding: 0.5rem 1rem;
        padding-left: 6mm;
        margin: 0;
        font-weight: 500;
        font-size: 1.6rem;
        border-top: 1px solid #dee2e6;
        border-bottom: 1px solid #dee2e6;
    }
    .tabs-container {
        margin-bottom: 0 !important;
    }
    .all-users-header {
        margin-top: 0 !important;
    }
    .admin-panel-content .col-12 {
        margin-bottom: 0;
        padding-bottom: 0;
    }

    .bg-light.p-3.rounded,
    .bg-white.p-3.rounded {
        width: 100%;
        box-sizing: border-box;
    }
    .w-30 {
        width: 30% !important;
        min-width: 200px;
    }
    #editUserModal .form-label,
    #deleteUserModal .form-label {
        font-weight: 700 !important;
    }
</style>
</html>
