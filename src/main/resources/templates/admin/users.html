<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
<h1>Admin Panel</h1>
<h2>User List</h2>
<table border="1" cellpadding="5">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Anna</td>
        <td th:text="${user.email}">anna@example.com</td>
        <td th:text="${user.age}">23</td>
        <td>
            <span th:each="role, iterStat : ${user.roles}">
                <span th:text="${role.name}">ROLE_USER</span>
                <span th:if="${!iterStat.last}">, </span>
            </span>
        </td>
        <td>
            <a th:href="@{/admin/edit/{id}(id=${user.id})}">Edit</a>
            |
            <form th:action="@{/admin/delete/{id}(id=${user.id})}"
                  method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Delete?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<br/>
<a th:href="@{/admin/new}">Add New User</a>
<br/>
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
