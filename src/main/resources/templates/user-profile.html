<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="fragments/header :: head">
    <title>User Profile</title>
</head>
<body>
<div th:replace="fragments/header :: navbar"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-white vh-100 p-3">
            <ul class="nav flex-column">
                <li sec:authorize="hasRole('ADMIN')" class="nav-item mb-2">
                    <a th:href="@{/admin}" class="nav-link text-dark">Admin</a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/user}" class="nav-link text-dark active bg-primary text-white">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 bg-white">
            <div class="container-fluid mt-4">
                <div class="row">
                    <div class="col-12">
                        <div class="bg-light p-3 rounded mb-0">
                            <h1 class="mb-3">User information-page</h1>
                        </div>
                        <div class="bg-white pt-3 pb-2 px-3 rounded">
                            <div class="all-users-header">
                                About user
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Roles</th>
                                    </thead>
                                    </thead>
                                    <tbody id="userProfileTable">

                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/user/current')
            .then(response => response.json())
            .then(user => {
                const tbody = document.getElementById('userProfileTable');
                tbody.innerHTML = '';
                const row = tbody.insertRow();
                row.insertCell().textContent = user.id;
                row.insertCell().textContent = user.firstName;
                row.insertCell().textContent = user.lastName;
                row.insertCell().textContent = user.age;
                row.insertCell().textContent = user.email;
                const rolesCell = row.insertCell();
                rolesCell.textContent = user.roles.map(r => r.name ? r.name.replace('ROLE_', '') : (r.displayName || r.name)).join(', ');
            })
            .catch(error => console.error('Ошибка загрузки профиля:', error));
    });
</script>
</body>
</html>
